<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizando Links</title>
    <style>
        /*
        # = id
        . = class
        : = pseudo-classe
        :: = pseudo-elemento
        > = children

        */
        body{
        font-family: Arial, Helvetica, sans-serif;
        }

        a{
        color: orangered;
        text-decoration: none;
        font-weight: bold;
        }

        a:visited{
        color: blue;
        text-decoration: underline;
        }

        a:hover{
        color: pink;
        text-decoration:underline;
        }

        a:active{
        color: green;
        }

        .especial{
            background-color: blanchedalmond;
        }

        .especial::after{
            content:' ⭠';
            text-decoration: none;
            font-weight: lighter;
            color: black;

        }
        .especial::before{
            content: '⭢ ';
            color: black;
            text-decoration: none;
            font-weight: lighter;
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul type="circle">
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" target="_blank" class="especial">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do Curso</a></li>
    </ul>
    <p><a href="hover.html">voltar</a></p>
</body>
</html>
